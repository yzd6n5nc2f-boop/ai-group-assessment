name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Check Azure deployment token
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_RIVER_02011511E || vars.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_RIVER_02011511E }}
        run: |
          if [ -z "$AZURE_STATIC_WEB_APPS_API_TOKEN" ]; then
            echo "AZURE_STATIC_WEB_APPS_API_TOKEN_RED_RIVER_02011511E is not available to this workflow run."
            echo "Add it as a repository Actions secret, or as a repository Actions variable, then rerun this workflow."
            exit 1
          fi

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          deployment_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_RIVER_02011511E || vars.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_RIVER_02011511E }}
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_RIVER_02011511E || vars.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_RIVER_02011511E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_RIVER_02011511E }}
          action: close
